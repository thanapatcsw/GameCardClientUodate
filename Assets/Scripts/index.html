<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup City - Developer Registration</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Bai+Jamjuree:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #bc13fe;
            --accent: #ff00ff;
            --bg: #050811;
            --glass: rgba(15, 23, 42, 0.7);
            --border: rgba(0, 243, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Bai Jamjuree', sans-serif;
            background: var(--bg);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 243, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(188, 19, 254, 0.1) 0%, transparent 40%);
        }

        /* Animated Background Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            perspective: 1000px;
        }

        .register-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 
                        0 0 20px rgba(0, 243, 255, 0.1);
            position: relative;
            animation: cardEntrance 0.8s ease-out forwards;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px) rotateX(-10deg); }
            to { opacity: 1; transform: translateY(0) rotateX(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 28px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #8a94b5;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--primary);
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 12px rgba(0, 243, 255, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(188, 19, 254, 0.4);
            filter: brightness(1.1);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 13px;
            color: #8a94b5;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        /* Password matching indicator */
        #passMatch {
            font-size: 11px;
            margin-top: 4px;
            display: block;
            min-height: 14px;
        }

        .match-ok { color: #00ff88; }
        .match-fail { color: #ff3366; }

        /* Custom SweetAlert Style */
        .swal2-popup {
            background: #0f172a !important;
            border: 1px solid var(--border) !important;
            border-radius: 20px !important;
        }
    </style>
</head>

<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <div class="register-card">
            <div class="header">
                <div class="logo">STARTUP CITY</div>
                <div class="subtitle">The Great Hackathon: Register New Developer</div>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Username / ชื่อที่แสดงในเกม</label>
                    <input type="text" id="username" required placeholder="เช่น นายประหยัด, DevKeng" minlength="3">
                </div>

                <div class="form-group">
                    <label for="email">Developer Email / อีเมล</label>
                    <input type="email" id="email" required placeholder="example@email.com">
                </div>

                <div class="form-group">
                    <label for="password">Access Code / รหัสผ่าน</label>
                    <input type="password" id="password" required placeholder="อย่างน้อย 6 ตัวอักษร" minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Access Code / ยืนยันรหัสผ่าน</label>
                    <input type="password" id="confirmPassword" required placeholder="พิมพ์รหัสผ่านอีกครั้ง">
                    <span id="passMatch"></span>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span>SYSTEM OVERRIDE [REGISTER]</span>
                </button>
            </form>

            <div class="footer">
                Already have access? <a href="#">Launch Application</a>
            </div>
        </div>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://uwspzhwvjpkcjpoqgkhp.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3c3B6aHd2anBrY2pwb3Fna2hwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MzUwMzYsImV4cCI6MjA5MDQxMTAzNn0.hgTN21pBcTD2meqXxKnydit0U7inI3OpMOAFVy9NtEE';

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const form = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const matchLabel = document.getElementById('passMatch');

        // Real-time password matching check
        function checkMatch() {
            if (!confirmInput.value) {
                matchLabel.textContent = '';
                return;
            }
            if (passwordInput.value === confirmInput.value) {
                matchLabel.textContent = '✅ รหัสผ่านตรงกัน';
                matchLabel.className = 'match-ok';
            } else {
                matchLabel.textContent = '❌ รหัสผ่านไม่ตรงกัน';
                matchLabel.className = 'match-fail';
            }
        }

        passwordInput.addEventListener('input', checkMatch);
        confirmInput.addEventListener('input', checkMatch);

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = passwordInput.value.trim();
            const confirmPassword = confirmInput.value.trim();
            const username = document.getElementById('username').value.trim();

            // Validation
            if (password !== confirmPassword) {
                Swal.fire({
                    icon: 'error',
                    title: 'รหัสผ่านไม่ตรงกัน',
                    text: 'กรุณาตรวจสอบรหัสผ่านทั้งสองช่องให้ตรงกันครับ',
                    confirmButtonColor: '#bc13fe'
                });
                return;
            }

            if (password.length < 6) {
                Swal.fire({
                    icon: 'warning',
                    title: 'รหัสผ่านสั้นเกินไป',
                    text: 'คุณต้องระบรหัสอย่างน้อย 6 ตัวเพื่อความปลอดภัยครับ',
                    confirmButtonColor: '#00f3ff'
                });
                return;
            }

            // Disable button during process
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span>INITIALIZING...</span>';

            try {
                // SignUp with Username in Metadata
                const { data, error } = await _supabase.auth.signUp({ 
                    email: email, 
                    password: password,
                    options: {
                        data: {
                            username: username
                        }
                    }
                });

                if (error) throw error;

                if (data.user) {
                    Swal.fire({
                        icon: 'success',
                        title: 'ลงทะเบียนสำเร็จ!',
                        text: `ยินดีต้อนรับคุณ ${username}! สามารถนำอีเมลและรหัสผ่านนี้ไป Login ในแอปพลิเคชันได้เลย`,
                        confirmButtonText: 'รับทราบ',
                        confirmButtonColor: '#00f3ff'
                    }).then(() => {
                        form.reset();
                        matchLabel.textContent = '';
                    });
                }
            } catch (error) {
                console.error(error);
                let errorMsg = 'เกิดข้อผิดพลาดในการเชื่อมต่อระบบ';
                
                if (error.message.includes("already registered")) {
                    errorMsg = 'อีเมลนี้ถูกใช้งานไปแล้ว กรุณาใช้อีเมลอื่นในการสมัคร';
                } else if (error.message.includes("valid email")) {
                    errorMsg = 'รูปแบบอีเมลไม่ถูกต้อง';
                } else {
                    errorMsg = error.message;
                }

                Swal.fire({
                    icon: 'error',
                    title: 'ล้มเหลว!',
                    text: errorMsg,
                    confirmButtonColor: '#ff3366'
                });
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>SYSTEM OVERRIDE [REGISTER]</span>';
            }
        });

        // Simple Background Particles Effect
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.style.position = 'absolute';
                particle.style.width = Math.random() * 3 + 'px';
                particle.style.height = particle.style.width;
                particle.style.background = Math.random() > 0.5 ? '#00f3ff' : '#bc13fe';
                particle.style.borderRadius = '50%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.opacity = Math.random() * 0.5;
                particle.style.boxShadow = `0 0 10px ${particle.style.background}`;
                container.appendChild(particle);
            }
        }
        createParticles();
    </script>
</body>

</html>
