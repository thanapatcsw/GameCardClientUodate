<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="1500" height="2100">
  <defs>
    <filter id="premium-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur1" />
      <feGaussianBlur stdDeviation="2" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="circuit" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M15 15 L45 15 L60 30 L60 50 M30 0 L100 0 L100 20 L80 40 L80 60" stroke="#2a2d33" stroke-width="3" fill="none"/>
      <circle cx="15" cy="15" r="4" fill="#2a2d33"/>
      <circle cx="60" cy="50" r="4" fill="#2a2d33"/>
      <circle cx="80" cy="60" r="4" fill="#2a2d33"/>
      <path d="M0 80 L30 80 L50 100 L50 120 M70 120 L70 90 L90 70 L120 70" stroke="#394047" stroke-width="2" fill="none"/>
      <circle cx="30" cy="80" r="3" fill="#394047"/>
      <circle cx="70" cy="90" r="3" fill="#394047"/>
    </pattern>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e2124"/>
      <stop offset="50%" stop-color="#111315"/>
      <stop offset="100%" stop-color="#040405"/>
    </linearGradient>
    <linearGradient id="badge-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e3338"/>
      <stop offset="100%" stop-color="#0b0c0d"/>
    </linearGradient>
  </defs>

  <rect width="400" height="600" fill="url(#bg-grad)"/>
  <rect width="400" height="600" fill="url(#circuit)"/>

  <path d="M 0 0 L 400 0 L 400 80 L 290 80 C 260 80, 250 120, 230 130 C 215 138, 185 138, 170 130 C 150 120, 140 80, 110 80 L 0 80 Z" fill="#121417"/>
  <path d="M 0 80 L 110 80 C 140 80, 150 120, 170 130 C 185 138, 215 138, 230 130 C 250 120, 260 80, 290 80 L 400 80" stroke="#e0e0e0" stroke-width="4" fill="none" filter="url(#premium-glow)"/>

  <path d="M 50 65 L 350 65 L 360 75 L 360 115 L 350 125 L 50 125 L 40 115 L 40 75 Z" fill="#070809" stroke="#e0e0e0" stroke-width="3" filter="url(#premium-glow)"/>
  <path d="M 55 73 L 345 73 L 350 78 L 350 112 L 345 117 L 55 117 L 50 112 L 50 78 Z" fill="none" stroke="#a0aab2" stroke-width="2"/>
  <rect x="45" y="85" width="5" height="20" fill="#e0e0e0"/>
  <rect x="350" y="85" width="5" height="20" fill="#e0e0e0"/>

  <circle cx="345" cy="55" r="42" fill="url(#badge-grad)" stroke="#e0e0e0" stroke-width="3" filter="url(#premium-glow)"/>
  <circle cx="345" cy="55" r="32" stroke="#a0aab2" stroke-width="2" fill="none"/>
  <text x="345" y="52" font-family="Segoe UI, sans-serif" font-size="12" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1">STORAGE</text>
  <text x="345" y="68" font-family="Segoe UI, sans-serif" font-size="9" font-weight="bold" fill="#e0e0e0" text-anchor="middle" letter-spacing="2">BONUS</text>

  <path d="M 15 160 L 385 160 L 385 450 L 365 470 L 35 470 L 15 450 Z" fill="#00FF00" stroke="#e0e0e0" stroke-width="4" filter="url(#premium-glow)"/>

  <path d="M 15 490 L 385 490 L 385 570 C 385 580, 375 585, 360 585 L 40 585 C 25 585, 15 580, 15 570 Z" fill="#121417" stroke="#e0e0e0" stroke-width="3" filter="url(#premium-glow)"/>
  <rect x="25" y="500" width="350" height="75" fill="none" stroke="#a0aab2" stroke-width="2"/>
  <rect x="40" y="515" width="6" height="45" fill="#e0e0e0"/>
  <rect x="360" y="515" width="2" height="10" fill="#e0e0e0"/>
  <rect x="360" y="530" width="2" height="15" fill="#a0aab2"/>
  <rect x="360" y="550" width="2" height="10" fill="#a0aab2"/>
  <path d="M 15 480 L 50 480 L 60 475" stroke="#a0aab2" stroke-width="2" fill="none"/>
  <path d="M 385 480 L 350 480 L 340 475" stroke="#a0aab2" stroke-width="2" fill="none"/>
</svg>
