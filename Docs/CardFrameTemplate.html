<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Frame UI Template</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-height: center;
            background-color: #2c3e50;
            padding: 50px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* โครงการ์ดหลัก (ขนาดมาตรฐาน อัตราส่วนคล้าย 2.5:3.5) */
        .card-frame {
            width: 320px;
            height: 448px;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 4px solid #34495e;
        }

        /* ไอคอนแต้ม (มุมซ้ายบน) */
        .score-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 45px;
            height: 45px;
            background-color: #f1c40f;
            border: 3px solid #f39c12;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* รูปขวาบน (ชนิดหมวดทรัพยากร) */
        .category-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background-color: #e74c3c; /* สีแดง CPU */
            border-radius: 8px;
            border: 2px solid #fff;
            z-index: 10;
        }

        /* พื้นที่ใส่รูปภาพ กรีนสกรีน (ภาพอาร์ตเวิร์ค 50-60%) */
        .image-placeholder {
            width: 100%;
            height: 220px;
            background-color: #00FF00; /* สีเขียวเจาะทะลุง่าย */
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1a4d1a;
            font-size: 14px;
            font-weight: bold;
        }

        /* แถบชื่อการ์ด */
        .title-bar {
            width: 100%;
            height: 40px;
            background-color: #2c3e50;
            color: white;
            display: flex;
            align-items: center;
            padding-left: 15px;
            font-size: 18px;
            font-weight: bold;
            border-top: 2px solid #34495e;
            border-bottom: 2px solid #ecf0f1;
        }

        /* พื้นที่คำอธิบาย */
        .desc-box {
            flex-grow: 1;
            padding: 10px 15px;
            font-size: 14px;
            color: #7f8c8d;
            background-color: #f9f9f9;
        }

        /* แถบราคา (ด้านล่างสุด) */
        .cost-bar {
            height: 50px;
            background-color: #ecf0f1;
            border-top: 2px solid #bdc3c7;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 10px;
        }

        /* ไอคอนราคาแต่ละชิ้น */
        .cost-icon {
            display: flex;
            align-items: center;
            background: #fff;
            border: 1px solid #ccc;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 14px;
        }
        
        .cost-icon.blue { color: #2980b9; border-color: #2980b9; }
        .cost-icon.white { color: #7f8c8d; border-color: #95a5a6; }
    </style>
</head>
<body>

    <!-- รูปแบบกรอบการ์ดสำหรับนไปดราฟทับ -->
    <div class="card-frame">
        <!-- แต้มและชนิด -->
        <div class="score-badge">4</div>
        <div class="category-badge"></div>

        <!-- หน้าต่างใส่รูป -->
        <div class="image-placeholder">
            [พื้นที่ใส่รูป Transparent / Chroma Key]
        </div>

        <!-- ชื่อการ์ด -->
        <div class="title-bar">
            Transistor
        </div>

        <!-- เนื้อหาการ์ด -->
        <div class="desc-box">
            สวิตช์อิเล็กทรอนิกส์ขนาดจิ๋ว...<br><br>
            <i>(เว้นไว้ใส่ Tooltip Text ในเกม)</i>
        </div>

        <!-- ทรัพยากรที่ต้องจ่าย -->
        <div class="cost-bar">
            <span>ราคา:</span>
            <span class="cost-icon blue">💧 x 2</span>
            <span class="cost-icon white">☁️ x 1</span>
        </div>
    </div>

</body>
</html>
