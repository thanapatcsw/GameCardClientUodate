<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 448" width="320" height="448">
  <defs>
    <filter id="drop-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background / Border -->
  <rect width="320" height="448" rx="16" fill="#ffffff" stroke="#34495e" stroke-width="6"/>
  
  <!-- Image Placeholder (Green Screen) -->
  <path d="M 3 16 Q 3 3 16 3 L 304 3 Q 317 3 317 16 L 317 220 L 3 220 Z" fill="#00FF00"/>
  
  <!-- Title Bar -->
  <rect x="3" y="220" width="314" height="44" fill="#2c3e50"/>
  <text x="20" y="248" font-family="Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="white">Title / ชื่อการ์ด</text>
  
  <!-- Content Background -->
  <rect x="3" y="264" width="314" height="130" fill="#f9f9f9"/>
  <!-- Text Lines Mockups -->
  <rect x="20" y="280" width="280" height="10" rx="4" fill="#bdc3c7"/>
  <rect x="20" y="304" width="240" height="10" rx="4" fill="#bdc3c7"/>
  <rect x="20" y="328" width="160" height="10" rx="4" fill="#bdc3c7"/>
  
  <!-- Cost Bar Base -->
  <rect x="3" y="394" width="314" height="51" fill="#ecf0f1"/>
  <line x1="3" y1="394" x2="317" y2="394" stroke="#bdc3c7" stroke-width="2"/>
  
  <!-- Cost Area Label -->
  <text x="20" y="426" font-family="Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="#7f8c8d">Cost:</text>

  <!-- Cost Badge 1 -->
  <rect x="70" y="406" width="60" height="28" rx="14" fill="#ffffff" stroke="#2980b9" stroke-width="1.5"/>
  <circle cx="84" cy="420" r="8" fill="#2980b9"/>
  <text x="100" y="425" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">x2</text>
  
  <!-- Cost Badge 2 -->
  <rect x="140" y="406" width="60" height="28" rx="14" fill="#ffffff" stroke="#e74c3c" stroke-width="1.5"/>
  <circle cx="154" cy="420" r="8" fill="#e74c3c"/>
  <text x="170" y="425" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">x1</text>
  
  <!-- Category Logo Top Right -->
  <rect x="275" y="15" width="30" height="30" rx="6" fill="#e74c3c" stroke="#ffffff" stroke-width="2" filter="url(#drop-shadow)"/>
  
  <!-- Score Badge Top Left -->
  <circle cx="35" cy="35" r="22" fill="#f1c40f" stroke="#f39c12" stroke-width="3" filter="url(#drop-shadow)"/>
  <text x="35" y="43" font-family="Segoe UI, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">4</text>

  <!-- Outline fix for rounded corners bottom -->
  <path d="M 3 432 Q 3 445 16 445 L 304 445 Q 317 445 317 432 L 317 445 L 3 445 Z" fill="#ecf0f1"/>

</svg>
